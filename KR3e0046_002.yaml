body:
  text: 急救仙方卷二疔瘡治法夫疔瘡之初生也人多不覺生於頭面手足肚脅腰腿間亦無定處一二日必作寒熱如瘧頭疼體痛不可忍其痛稍異於尋常之證遍身尋認如有小瘡與常瘡稍異即是疔也此瘡為患各有所因而其形狀亦各不同豬疔形圓而小瘡口內有油羊疔形長色白牛疔形圓而小瘡口內無油狗疔形長或帶尖色赤驢馬疔其狀三角頂上有黑㸃根赤或凸要知此瘡非特豬牛狗羊驢馬之毒所致宿水不潔飲之亦生水疔豆腐中有人汗食之亦生豆腐疔又有氣疔鬼疔形狀雖不一然其治之之法則一瘡色緩第一日瘡頂皰色小白第二日色大白第三日色微紫第四日色真紫瘡色急第五日色微青小緊第六日色深青大緊第七日色黑其狀如魚臍又如灸瘡之狀乃最緊急之候也瘡證吉有應謂生一疔之外别處肉上再生一小瘡即是有應可用針挑破護場謂瘡四圍有赤腫飲食如常頭痛身熱手足溫瘡多者謂之滿天星瘡證凶無應謂别處肉上無瘡不護場謂疔四圍無赤腫內疔盛渴欲飲水飲食不進頭眩眼花護床不動卧不起也眼白睛凝不轉唇舌青腹痛甚五心腫手足冷氣粗無脉夫內疔之證與外疔之證同亦發寒熱頭疼體痛但瘡形不現過數日胸背腹脅頭面手足間或有一處腫起即內疔所發之處急用霹靂火治不護場瘡之汗法於腫處出汗若身體寒熱雖未有腫起但腹痛甚者便須作內疔證用後法治之不可緩也蟾酥丸治內疔取蟾酥時用桑葉一小錢大入蟾酥揉和得所丸如念珠隂乾用病勢重者用二粒輕者用一粒置病人舌上噙化化後良久用井花水灌潄再用雄黃丸七丸冷茶清吞下得臟腑利數行其病應手而愈霹靂火法取鵝卵石炭火煆通赤用澱桶一隻置竹椅一隻於桶上又用一杓置竹椅下令病人裸體坐於椅上取荆芥為末調入酸米醋於桶內却置煆石於杓中即用荆芥醋淋沃石上火力不可大恐病人難禁若火力已微汗尚未透可再加火力再沃之沃熏之時用衾覆蓋自頭至足連桶俱覆止留口鼻在外令遍身汗出須要頭面皆有汗病乃除此法絶妙若老人虛人孕婦不宜汗下者可針破瘡口用海馬拔毒散㸃瘡酒煎蒼耳服如毒入裏須用霹靂火時病人不須入桶止用一小水桶依前法以杓盛煆石在桶中用荆芥醋淋沃令病人側身以腫處覆在桶上四圍用衾被遮護勿令氣泄良久腫處出汗如汗未透可再加火力再沃之須令腫處汗透却不必遍身汗也若瘡在兩脅間毒氣欲奔心乃危急之證也可急於患處尖上用艾炷灸三五壯仍於灸穴前後針出少血灸瘡四圍有皰起吉無皰凶若瘡生於虛軟不便處不可用針灸者可用松針截法針斷紅絲路如瘡生於兩胯間毒氣欲奔腎者亦用松針於兩胯紅絲路盡處針斷出血如瘡生頭靣上者可於項間紅絲路盡處針斷出血或各處紅絲路有不現者亦可以意消詳用松針針之凡用松針者倘遇紅絲路不現無可下手可於頷下兩腋間兩胯間虛軟處下手針斷毒氣毋令攻心攻腎而已松針法取向北松枝上葉極硬者頓齊作一束扎令極緊緩緩以意消詳毒氣所經行虛軟處針之須令出血針時先用酒潤下針處針必小痛令病人稍忍仍用雄黃麝香為末溫酒調一二服與之服之方下針若表證皆罷毒氣入裏者雄黃丸主之若手足厥冷六脉俱絶者此乃毒氣已深氣血為毒氣所併不能流通是以體冷而脉不現必須用木香流氣飲連進數服氣血流通則脉自回矣然後依法治之萬無一失桃花散治諸疔瘡雖凶證迭見六脉俱絶垂死者此藥悉能主之蟾酥少許信石少許蟬蛻三個去足翅蜈蚣頭一個斑猫三箇去足翅谷丹伍錢風化石一兩沙碢盛瓦片蓋炭火煆二時久取出右各製研末令極細指爪甲刮葱白皮內涎調藥先以松針針破瘡口可深半寸凡疔瘡必有紅絲路可隨紅絲斜下針如瘡在胸以上可斜向下如在胸以下可斜向上蓋瘡毒喜趨心故下針亦隨毒氣所行也出針候瘡口有惡血須令出盡别將蟾酥一粒如麥粒大入瘡口中用針送令深入却以前葱涎所調藥敷瘡口莫敷在好肉上再用冷水浸濕紙二三十重貼在藥上封固其瘡如清早封固至晚覺瘡口熱即去紙水洗去藥令净用玉紅散摻瘡口瘡口必有數日璺作疼痛只用玉紅散糝瘡仍日用葱湯洗疔瘡之證雖危惡但能針破瘡口入蟾酥在內以桃紅散封固瘡後即可保其回生也至如瘡口璺作疼痛不可忍可不必憂此非疔毒為害乃是蟾酥作腐疔毒故爾痛也可採芙蓉葉桑葉擂碎敷瘡四圍散其血勿令血潮日夜各換一藥又須洗瘡後上藥其瘡可不日安好也若疔瘡初起必發寒熱身疼此乃毒氣在表當汗而解自沸湯主之老人虛人孕婦不宜汗下止用桃紅散拔毒拔疔法諸疔不出者用此以拔之巴豆去殼半粒磁石研右各為末拌勻用蔥涎同蜜為膏以敷瘡上疔自出矣自沸湯白礬五錢青黛三錢冢間貼背乾石灰三錢右各為細末研至無聲為度拌和令勻每服三錢井花水半碗桞條攪千百下頓服之厚衣蓋覆良久再用蔥䜴湯入醋少許極熱服少助藥力得汗而解若始不覺是疔瘡未曾用前法汗過數日方覺則寒熱體痛皆罷毒氣入裏矣須用利藥使內毒氣下泄雄黃丸主之雄黃丸雄黃五錢鬱金五錢巴豆去心殼略去油半錢一方加信石一字許不可多用清油煮半日取出曬乾入藥一方加斑猫七箇去翅觜糯米拌炒變色去米以治瘰癧一方加𤣥胡粉三錢以治咽喉腫痛等證右各研為細末麵糊為丸如菉豆大每服七丸冷茶清吞下取利為度如未利再服玉紅散寒水石一兩煆輕粉少許谷丹少許右研細末糝瘡口日夜二洗二換蓋蟾膏桃紅散皆為毒藥故令瘡疼痛須用玉紅散解二藥之毒二藥散血瘡自當安若一時未能辦蟾酥桃紅散等藥可用李世安治疔瘡法治之功效尤速當歸散當歸尾二兩川芎荆芥穗乾葛烏藥川獨活白芷升麻赤芍藥各一兩羌活甘草防風去蘆枳殼各半兩紅花蘇木各二錢半瘡疼痛者加乳香沒藥白芷各五錢瘡熱不退加筀竹青山梔仁各少許大便閉加枳殼一兩燥煩加燈心十莖竹茹一塊渴者加天花粉一兩腫者加甘草節降真節各半兩眼暈者倍加川芎白芷荆芥防風渴而小便閉者加滑石一兩右㕮咀每服五錢燈草數莖烏豆十粒水一鍾半煎至八分病在上食後服病在下食前服連進取效若患疔瘡始初不覺未曾用前法汗過數日外證皆罷或在腹脅之間或在胸腋之下腫起此乃毒氣入裏所致宜用霹靂火治之若服當歸散外證不解者亦急用霹靂火發散追疔奪命湯能內消腫毒羌活獨活青皮防風多用黃連赤芍藥細辛甘草節蟬蛻僵蠶腳蓮加河車澤蘭金銀花有膿加何首烏白芷取利加青木香大黃梔子牽牛在腳加木瓜右㕮咀每服五錢先將一服加澤蘭葉金銀花各一錢生薑十錢同藥擂爛好酒調熱服之如不飲者水煎加少酒服尤妙然後用酒水各一盞半生薑十片煎熱服以衣被蓋覆汗出為度病退减後再以前藥加大黃二錢煎熱服或利一兩次以去餘毒為妙此方以藥味觀之甚若不切然纍用纍效萬無一失如别有他證宜隨證加减治之嘔逆惡心加乳香菉豆粉甘草湯下又用紫河車老薑米醋一同調下心煩嘔名伏暑用硃砂五苓散嘔逆加母丁香石蓮同前藥煎服又不止用不換金正氣散或加人參木香煎服嘔不止手足冷名喫水用黃連香薷飲吞消暑丸手足冷加宣木瓜牽牛心煩加麥門冬赤芍梔子燈草潮熱加北柴胡黃芩淡竹青絲茅根眼花加硃砂雄黃麝香少許腹脹加薏苡仁寒水石自利加白术茯苓肉豆䓻鶯粟殼腹痛不止加南木香乳香喘嗽加知母貝母白砂蜜少許頭痛加川芎白芷蔥白痛不止用蘿蔔子川芎蔥白擂碎敷太陽冗痰涎多用生艾尾葉米醋擂取汁潄去痰咽喉痛用山豆根凌霄梗梔子淡竹葉艾葉燈草水煎潄大便閉加薑製赤芍藥麩炒枳殼大腹皮小便閉加赤芍藥赤茯苓木通車前子燈草尿血出加生地黃車前子鼻出血加野紅花地黃藕節薑皮瘡不痛頂不起灸三壯更不痛不治骨蒸加絲茅根無脉服二十四味流氣飲飛龍奪命丹治疔瘡發背腦疽乳癰附骨疽一切無頭腫毒惡瘡服之便有頭不痛者服之便痛已成者服之立愈此乃惡證藥中至寶病危者服之亦可好萬無一失不可輕忽蟾酥二錢乾者老酒化血竭一錢乳香二錢沒藥二錢雄黃三錢輕粉半錢膽礬一錢麝香半錢銅緑二錢寒水石一錢硃砂二錢為衣海羊二十一箇即是蝸牛連殼用天龍一條即蜈蚣酒浸炙黃去頭足腦子半錢如無亦可右為細末將海羊研作泥和前藥為丸如菉豆大若丸不就酒煮麵糊為丸每服止二丸先用蔥白三寸令病人嚼爛吐於手心男左女右將丸子裹在蔥白內用無灰熱酒三四盞送下於避風處以衣被蓋覆約人行五里之久再用熱酒數杯以助藥力發熱大汗出為度如病重汗不出再服二丸汗出即效若初服二丸但消三五病重者再進二丸如疔瘡走黃過心者難治汗出冷者亦死如病人不能嚼蔥擂碎裹藥用酒吞之瘡在上食後服在下食前服服後忌冷水黃瓜茄子油麵豬羊魚肉一切發風發瘡毒物及婦人洗換狐臭百發百中也急救仙方卷二考證第六頁前二行原本是以體冷而不現句當脫一脉字謹增
