  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0046_WYG_006-1a, image: WYG0744/WYG0744-0697c.png}
body:
  text: 急救仙方卷六雜證附小兒方大補諸虚百損不問老少有疾皆效破故紙二兩隔紙炒令香熟白茯苓一兩去皮没藥一兩用無灰酒浸右候酒浸沒藥如餳糖様用前二味為末酒糊為丸如梧桐子大每服二三十丸空心熟水下仙方云昔有人服此藥者至老顔容不衰葢破故紙補腎茯苓養心沒藥養血三者既壯自然身安調脾散治經氣行時血反上行而吐此因肺經有病熱氣上冲但要順經調氣紅花散子善能痊治凡婦人吐血有三一經不行而反上二傷衝脈三肺經受熱血隨上冲故致吐血三稜莪蒁各一兩麥芽半兩胡椒二錢縮砂三錢川芎二錢茴香二錢甘草青皮陳皮各三錢右為末米飲調下通經丸當歸一錢半桂不見火青皮去白大黄炮乾薑炮川烏炮桃仁去皮炒莪术炒乾漆炒令烟盡川椒各一錢右同椒㣲炒放地上出汗為末一半用醋熬成膏後再入一半更入雞子清同為丸隂乾醋湯下三十丸治吐血咯血用自己新熱小便服之自可漸愈方治三危證吐血内損或因酒色損傷心肺血氣妄行口鼻俱出荆芥一握燒灰置地上出火毒右件細研每服三錢陳米飲調下又方百草霜不拘多少右件細研每服三錢濃米飲調下三服妙黒龍丸治諸般欬嗽善化痰涎不問老少逺年近日明礬枯池礬枯各一分南星炮二分半夏泡二分百藥煎二分五味子一分米泔浸一宿豬牙皂角一分去皮弦烏梅肉二分焙乾右為末麵糊為丸如梧桐子大每服三十丸冷嗽淡薑湯臨睡下熱嗽茶清睡時下化痰丸明礬枯一分白附子南星半生半熟半夏泡各半兩右為末薑汁煮糊為丸如梧桐子大每服二三十丸食後薑湯下治欬嗽人參去蘆防風去蘆半夏湯泡甘草陳皮去白炒桔梗去蘆炒杏仁去皮尖麻黄去節桑白皮去麄皮紫蘇馬兜鈴去筋膜炒如無粟殻代去筋膜炒乾烏梅每服半箇右等分㕮咀每服三錢生薑五片煎至七分去滓睡至一更盡通口服或併滓或留滓次夜量證輕重加減勞嗽加五味子五心煩熱加地骨皮口乾加人參麥門冬痰多加南星炮腹脹加枳殻炒胷滿加枳殻肺脹加桑白皮炒大便秘結加大腹皮夜睡多驚加人參逺志去心倒頭不得加苦葶藶喘急腰痛脚膝無力加木𤓰烏藥手足麻痺加烏藥防己感冷欬嗽加乾薑肉桂細辛失聲加訶子薄荷發則欬嗽不已别煎九寳飲加童便水煎服吐紅加茅花藕節吐欬紅線加蒲黄茅花燒灰入藥欬唾粉紅者加百合五倍子茅花同燒灰存性飲食不進加白芍藥白术薑棗同煎暴欬紅者及五心發熱别用茯苓補心湯加茅花蒲黄煎咽乾口燥加人參乾葛傷寒惡風喘急欬嗽别煎小青龍湯四時感冒金沸草散加桑白皮粟殻感風欬嗽頭疼加川芎白芷薑葱煎傷寒發熱欬嗽去粟殻加柴胡黄芩潮熱欬嗽者參蘇飲徐徐煎服孕婦只服百合散丸燒灰者只入在盞内傾藥同服服此藥平差再用米飲服丸藥空心下凡欬嗽切忌生冷減去酸燒煎炙油膩酒麵羊肉子鴨魚腥豆腐房事人參交龍散治諸嗽不愈者人參阿膠炒欵冬花粟殻米醋炒右等分每服三錢加烏梅一箇煎半夜服二母散治喘急倒頭不得痰涎壅盛知母貝母各等分右為細末臨睡白湯調温服如喘急加苦葶藶末如久嗽不止加馬兜鈴末如無以粟殻代去筋膜不製治失聲皂角一梃去皮子蘿蔔三箇切作片右以水一椀同煎至半碗以下服之不過三服自能語聲出治鼻衂鬱金磨末右用白茅花絹包煎湯調服又方用車輪上垢膩成丸塞孔中妙治蟲牙風牙用藥有隂陽虚實且按時氣春宜正氣散夏宜敗毒散加大黄枳殻秋冬宜五積散消氣散治酒疸脾黄木鼈子右用醋磨服一二盞必能見功治小腸膀胱腫硬香附子炒研末右用海藻煎湯調下又方燈籠草連梗葉摶一握入罐内又入槌碎生薑一塊加生酒同煎空心熱服又方五苓散去肉桂加黒牽牛桔梗車前子名蟠葱散數服妙又一方加茵蔯木通又方食茴香乳香末豬苓桔梗木通甘草右各等分加燈心一握淡竹葉同煎多服取效治偏墜疝氣方先服復元通氣散次服五苓散各三錢去桂加黒牽牛吳茱茰湯泡等分如脹加陳枳殻麩炒痛甚加八角茴香煎服又方用栗子樹根南酒煎服立效偏腎氣以本人口為則於臍上灸偏在左灸右偏在右灸左然後服走馬茴香丸茱茰内消丸各一貼以生小酒加少鹽空心吞下換骨丹治風濕腰脚諸疾草烏六兩右研為末用生豆腐二兩搗和成餅子沸湯煑令浮再沸取出煑時最要斟酌葢煑太過則藥力輕煑不及則藥力又過重也又用米泔浸過蒼术三兩焙乾天麻一兩明浄者全蝎半兩洗去頭足微炒與草烏餅子同研為末米糊和丸如梧桐子大至晚勿食臨卧嚼木𤓰温酒下二十丸中夜藥透徧身及脚上覺麻痺即其效也活絡丹治腰脚諸疾胡盧巴四兩以二兩用海金沙四兩同炒令赤色又以二兩用巴豆四兩同炒令赤色海金沙者即俗名竹荽九月内多採下用紙糊團箕日下曬至乾却以竹竿敲下去葉取子用賣者恐偽巴豆去殻取完者用蒼耳草四兩焙乾俗名野茄葉本草名枲耳右纒藤四兩連葉焙乾用右三味為末以好生酒煮麵糊丸如梧桐子大用生酒吞下三四十丸病在腰半飢服病在膝脚空心服治五淋方服益母草汁一升立止一云葎草又方棘刺二升水五升煮取二升分三服差又方阿膠三兩炙以水二升煑取一升四合分再服又方酒服蒲黄末三方寸匕日二服太平聖恵方以粥飲調一錢服之治便血黄連柏葉焙右為細末空心酒調服又方荆芥穗砂仁右為細末每服三錢糯米飲調下每日三服又方五倍子不拘多少右為細末用鹽梅𢷬膏丸如梧桐子大每服五十丸酒湯任下治小兒急慢驚風震靈丹二十粒來復丹十粒白丸子十粒右三味研匀糯米糊丸如菉豆大大者五丸小者三丸慢驚用北棗陳皮煎湯吞下急驚用生薑自然汁百沸湯下治小兒周嵗患赤眼及未周嵗者用黄連為細末以茶清調塗手心足心即愈如或腫痛難開加薑黄皂角朴硝末同敷太陽穴手心足心加葱𢷬敷尤妙治小兒頭瘡證不可瀉餘毒只宜用菉豆皮穀精草入藥内服忌百物常喫螺螄為妙治孩兒痘瘡入目方白柿可常服
