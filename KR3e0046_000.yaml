body:
  text: 提要急救仙方六卷醫家類臣等謹案急救仙方六卷不著撰人名氏其書宋志及諸家書目均未著録惟焦竑國史經籍志載有救急仙方十一卷注云見道藏亦不言作者為誰考白雲霽道藏目録太元部惻字號中有急救仙方與永樂大典所載合則焦氏誤倒其文為救急也瘍醫自周禮即自為一科然傳習其術者多不能通古人之意是編於背瘡疔瘡眼科痔證四者所載證治尤詳蓋作者所擅長在此中間如論背瘡條內所載蓮子蜂窠散走流注腎俞諸發名目猥衆乃能一一討論各詳其證之形狀與得病之因療治之法條分縷晰為自來瘍科所未及其疔瘡門內所立追疔奪命湯一方備詳加減之法學者茍能觸類旁通亦足以資博濟之用非精於是術者不能作也雖雜瘡證諸門稍有闕佚然綱要具存正不以不完為病矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7ee8e511384ec97e1d217ca4d92021872638abfa09becd1a7a05743b36a2ba80
