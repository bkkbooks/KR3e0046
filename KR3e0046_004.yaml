body:
  text: 急救仙方卷四痔證痔二十四證歌皆因酒色氣風食五事過度而起痔證分三八憑君仔細看莫教年日久見者膽心寒菱角看形怪蓮花不可觀穿腸并鼠妳酒色兩相干莫謂翻花怨蜂窠亦不寬雌雄同氣血子母及腸盤元珠尤可怪勾腸痛若鑽核桃與流氣見者便心酸栗子於中大雞心在外安珊瑚形可惡那更脫肛難內痔紅不出搭腸裏內盤垂珠更難治日久有雞冠切莫輕刀火令君性命殘用工無半了去病更除根紅肉膏治痔方辰砂一錢乳香半錢别研白礬一兩黃丹一錢砒半兩用白礬鋪地火煅七分右為末每用二錢再用斑猫三箇巴豆三箇香油一兩同煎以斑猫巴豆赤為度去二味只用油調藥末成膏子看大小貼之一二日一換藥至六七日看焦黑不用塗用催藥未破已破以紙撚子任藥入瘡為妙金花散洗痔無名異半錢黃蘖一兩黃連半兩生烏黑豆半升右為末水煎待溫洗了用海蛤散傅龍骨海蛤散蕪荑一兩龍骨一錢海蛤一錢煆蜜陀僧半錢右為末先糝次用貼痔膏日一次貼乳香膏貼痔茱萸白芨白蘞黃連黃檗當歸各等分右為末用香油四兩入柳枝三尺四寸長同煎以柳枝黑為度入前藥末同煎紫色用絹濾去滓再煎數沸次入黃丹乳香一二錢熬成膏以瓦瓶貯之用少許貼瘡上立效凡下痔先服通血積藥一日二次方用換痔藥當歸飲通血積黃連火麻子當歸各半兩右為末每用一錢嚼溫酒下又將通真丸一粒臨卧再服通真煨薑丸良薑炮訶子炮肉桂去皮木香肉豆蔲破故紙茴香胡蘆巴各一錢末硇一錢右為末研勻醋和丸如梧桐子大每用一錢再用木瓜生薑同藥以濕紙裹煨令香熱溫酒下下膈散治不思飲食苦參蓬莪蒁炮荆芥穗炒益智各一兩去皮右為末每服一錢水一盞薑蜜同煎八分入鹽虛心服洗湯犀角散骨碎補穿山甲二兩蛤粉炒延胡索半兩生甘草根一兩右為細末茶調半錢空心服止痛麥煎散滑石三錢鱉甲半兩川烏一兩去皮尖秦芁半錢前胡半兩右為末每用二錢小麥三十五粒同煎至七分通口服不拘時三四服見效黑神黃耆散京墨黃牛角一隻蛇蛻一條全檳榔三箇豬牙皂角十箇穿山甲蔓荆子各一兩黑狗脊一兩去毛黃京子半兩枳殼半兩右為末以瓜蔞五箇去子入藥在內用新瓦瓶盛之後用黃泥封固火煆烟盡再入沒藥青木香末各一錢白蕪荑末半兩荆芥末一兩同前藥末拌勻每服二錢胡桃酒下日三服茶亦可宣風散巴豆去油大黃炮朴硝枳殼陳皮去瓤右各等分為末每服二錢水一盞煎至七分溫服如服藥後大便結澀二三日再服木通散人參一錢斑猫炒去足翅鶴蝨大黃牡礪煆枳殼各等分蓽澄茄半兩丁香少許右為末糯米糊為丸如梧桐子大每服五丸煎沙糖湯下此藥恐不可用又方生薑切薄片放在痔上痛甚處以熱艾作炷於薑上灸三壯黃水即出自消若肛門上有兩三箇痔三五日後如前法逐一灸之屢試甚效收膿膏海金砂乳香白芨雄黃各等分右為末入瘡口次以乳香膏貼之車前散食茱萸車前子雄黃乳香赤石脂龍骨各一錢生用右為末糝瘡口以乳香膏壓之一日二次如瘡口乾只用乳香膏貼有清水出用後藥注青膏注青膏五倍子三箇生延胡索白礬各一錢右為末服少許如清水出即以紙貼為膏藥入瘡口內金花散鬱金甘草灸白薑炮槐花炒各二兩右為末每服二錢空心陳米飲下山甲散治痔瀉血水者五倍子生穿山甲炒存性各一兩右為末每服二錢空心陳米飲下解腸散治臟毒瀉血威靈仙一分蕤仁一分貫衆一兩右為末每服二錢麝香酒調服神驗治痔方信半錢白礬一兩朴硝一兩沒藥半錢乳香半錢麝少許緑礬一兩右用鐵銅鍋先以信鋪鍋底以白礬覆之又以緑礬覆之又以硝覆之以火灸之候成水投乳香末攪勻候乾如石放地上一宿出火毒研末方入麝同研加片腦少許研極細用唾調塗附瘡口上四邊一日三次其痔自然焦落治痔方白礬四兩緑礬一分朴硝半兩信半兩右礬硝各先作末以少半入盞內以信成塊入中以餘藥覆上用炭約二斤許四圍燒之候沸將乾再覆藥末磁瓶收貯此藥經年火熟黃色則效而不疼赤色則不可用如傅外痔白礬減半欲速效用津液調傅欲不疼用甘草湯調傅先用茅根煎湯熱洗然後傅藥日夜三五易凡疼發必大腸祕結服寬腸丸以通大便不可燒烟熏入腸反為害暑月加百草霜黃丹調傅如痔已落肛門腫痛用槐皮煎湯洗用津滴瓦上磨枳殼拌藥傅如肛門不收木賊朴硝煎湯洗調傅各一次二次即效未落已前黃皮薄荷煎湯洗唾津調傅肛門夏月用此尤佳洗藥初用此洗木通黃芩黃柏黑豆等分右以水煎即洗三次治腸風痔漏等疾白芷一味以米泔浸一宿取出切片用火煆地令熱掃去灰將紙鋪在熱地上以白芷放在紙上翕乾為末每日酒調下又方皂角去子及皮蜜灸為末米糊丸用米飲吞下又方蒼耳葉或子焙乾為末蜜調服如要洗用朴硝末井花水調洗如要塗用蜜和雞蘇丸并朴硝末調塗上又方銅青蜜陀僧各一錢麝少許為末用津液和調搽之凡治痔久不瘥變漏不戒酒色服藥耳治則先用紙撚子細看大小淺深即服通真丸黃耆散用紙撚貼紅肉膏入瘡一日五六次再用乳香膏入作撚子貼瘡口日一次三五次進藥入瘡內凡取爛肉有血水出方可進藥須用收膿膏三日後用藥洗又三日用龍骨海蛤散糝之以車前散糝口內一日兩次服藥至三服極可取效後有水出即效也治驗許叔微普濟本事方唐峽中王及郎中充西路安撫使判官乘騾入駱谷及宿有痔疾因此大作其狀如胡瓜貫於腸頭熱如溏炭火至驛僵仆主驛吏云此病某曾患來須灸即瘥用柳枝濃煎湯先洗痔便以艾炷灸其上連灸三五壯忽覺一道熱氣入腸中因大轉瀉先血後穢一時至痛楚瀉後遂失胡瓜登騾而馳
