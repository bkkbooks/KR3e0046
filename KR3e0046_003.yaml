  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0046_WYG_003-1a, image: WYG0744/WYG0744-0680c.png}
body:
  text: 急救仙方卷三眼科補肝重眀丸羚羊角生地黃熟地黃肉蓯蓉枸把子防風草決眀各一兩楮實子半兩甘菊花羌活當歸各一兩羊子肝四兩煮焙右為末蜜丸如梧桐子大每服三十丸大抵肝主目肝受血而能視血弱則肝氣無以榮養肝氣不榮則膽水不能上運是致瞳神昏散目力虛弱視物不真此藥大能補飬肝血滋長膽水退目中隱悶空心鹽湯下則引藥性下達日午茶清下則可上清頭目臨睡酒下則可榮養氣血不飲酒則用人參當歸湯下久服甚妙當歸散老少虛實通用當歸二兩酒浸洗川芎二兩赤芍藥三兩熟地黃一兩酒洗荆芥半兩粉草半兩防風一兩白芷一兩右為末以白水煎服還睛丸蒺藜木賊威靈仙蟬蛻甘菊花石決眀草決眀川芎羌活青箱子密蒙花楮實子右等分為細末煉蜜丸如梧桐子大食後茶酒下五十丸紫金丸治眼祕方川芎一兩半當歸一兩半楮實薄荷各半兩栝樓根六錢蔓荆子二兩炒川椒一兩半焙去目甘菊花三錢浸密蒙花三錢蛇皮三錢浸荆芥穗三錢地骨皮一兩以上四味用甘草汁浸過焙乾白蒺藜一兩去尖炮右為細末煉蜜丸每丸一錢重隨引子下睛暗青盲者當歸酒下氣障者木香湯下婦人血暈當歸薄荷湯下有人因熱飲酒患眼三年不分道路服此藥二十五日效有因氣害眼昏暗八年不見光眀服此藥四十日效六十日愈眀又有因喪母失眀四年服此五十日效如舊清眀防風散治風毒攻眼睫落腫痛防風甘菊黃連草決眀黃芩甘草大黃赤芍木通各等分右㕮咀水一盞煎服地黃丸去風眀目甘菊花木賊半兩蒼术地黃枸把子各三錢荆芥三錢半右為末鍊蜜丸如梧桐子大食後茶下二十丸治眼出冷淚補肝用四物湯加木賊防風虛則用之實則用此方蒼术白蒺藜防風羌活川芎甘草木賊右為末米泔水調下治眼淚用消風散黑神散拌和茶清調下黑神散見後羌活散治熱眼防風二兩羌活一兩赤芍藥三兩白芷一兩川芎二兩柴胡一兩木賊半兩防已半兩粉草一兩荆芥一兩白茯苓二兩甘菊花一兩細辛半兩去葉白术一兩右㕮咀每服三錢水一盞半煎食後服瀉藥治眼一切積熱腫痛赤芍藥黃芩枳殼荆芥右各等分煎熱泡大黃朴硝五更雞鳴時服之治熱風眼冬青子不拘多少揉碎取汁濾極淨熬成膏子貯於瓷罐內埋地中七日出火毒用點熱眼又方治熱眼黃連朴硝各四兩白水熬成膏點之又方治熱眼取鯉魚膽汁點之熏暴赤眼用瓦瓶子煎薄荷荆芥防風湯乘熱氣熏之仍以手沃洗驅風發散虛實通用如解毒加桑白皮又方升麻二兩芍藥三兩川芎二兩柴胡三兩去蘆乾葛三兩玄參一兩去苗撫芎一兩黃芩半兩荆芥半兩甘草一兩白术半兩山梔子半兩赤茯苓一兩草決眀少用右㕮咀每服五錢水二盞煎至一盞去滓食後服㵼心湯治眼疼血輪紅赤龍膽草細辛山梔子大黃甘草烏頭右以水煎服㵼肝飲子治赤侵白處杏仁去皮扁蓄桑白皮右以水煎熱服三黃湯治暴赤腫熱毒黃連茯苓半兩大黃二兩煨甘草朴硝右為末每服二錢煎麥門冬湯食後調服茯苓散老人赤眼不退宜服此茯苓人參芍藥山梔子甘草紫蘇麥門冬瞿麥各一兩連翹二兩右㕮咀水煎服點爛弦風眼方爐甘石不拘多少火煆紅童子便淬七次研極細末用水飛過去土石以黃連當歸白芍荆芥防風薄荷細辛煎濃汁用五倍子內蟲同汁滴於鉢內細研汁乾時再滴藥汁再研極細以瓷瓶收貯臨期用熱茶洗眼然後以藥點上立效黑神散治婦人血風爛弦或因産後月水不調血沖瞳神痛不可忍此可散血行風孕婦莫服白术茯苓甘草茴香桂延胡索生地黃川芎芍藥蒲黃木香白芷當歸右為細末酒調下二錢食後服茶調散治男子婦人一切風腫癢痛翳爛弦風氣眼流淚並皆治之川芎防風羌活各一兩甘草半兩木賊石膏炒石決眀煆荆芥薄荷葉甘菊花各一兩右為細末每服二錢茶清調下搽爛弦方先用五倍子蔓荆子煎湯洗後用爐甘石二兩火煆以黃連汁童便共淬七八次研細銅青五錢麝少許硼砂一錢牙硝半錢右為細末搽眼弦點眼藥宣黃連洗淨銼碎不拘多少用瓦器水煎至半濾去渣再用瓦盞盛在湯瓶上蒸之至汁少却入研細腦子少許用淨器或角筒收貯點眼內或點爛弦亦妙熬藥時須用密絹濾過毋令塵屑在內治暴赤爛弦眼黃連五錢當歸尾三分朴硝三分杏仁二分黃蘗二分川續斷一分右銼碎以盞子盛在湯瓶上濃蒸乘熱蘸汁點入眼內又方治赤眼及昏痛緊閉眼勿開盛熱湯於器以手掬沃之湯冷即止日頻沃即安妙處在閉眼又方治眼疾諸般翳障昏暗大神效川芎五錢當歸一兩半栝樓根六錢生川椒七錢去子楮實半兩去子微炒甘菊一兩蛇蛻三錢甘草三錢黃連三錢蔓荆子一兩木賊二兩童子小便浸一宿焙乾密蒙花一兩地骨皮一兩薄荷半兩羌活一兩白蒺藜一兩半荆芥一兩右為細末煉蜜丸每一兩作十丸食後服日二次有翳者米泔水下睛暗者當歸湯下氣障礙者木香湯下婦人血暈薄荷當歸湯下忌葷腥酒濕麵服此藥纍效生犀復眀散治諸般眼疾芍藥黃芩各二兩木通桑白皮龍膽草去蘆防風羌活當歸尾各二兩大黃八錢枳殼去瓤六錢右㕮咀每服五錢水一盞半取鮮桑白皮少許同煎至八分食後服如目赤障厚者加生蚌粉痛腫者加生地黃磨翳障老虛者用蟬蛻二錢川芎二錢羚羊角一兩蒺藜去刺炒二錢甘草炒半錢當歸二錢熟地黃錢半木賊一錢去節夏枯草半錢石決眀二錢火煅石膏一錢火煅玄參一錢青箱子一錢右為末煉蜜丸如彈子大每服一丸食後蔥茶嚼下治眼生障栝樓根甘草草決眀赤芍各半錢右為末用蜜湯調下蒺藜丸退諸障翳石決眀川芎白芷防風木賊石膏覆盆子楮實去殼用米蟬蛻蔓荆子青箱子車前子細辛菊花旋覆花密蒙花龍膽草右等分為末煉蜜丸如梧桐子大每服四十丸食後茶清送下諸虛鹽湯下實者茅根蔗湯下缺珠豬肝煎湯下垂簾障每服二十丸四物湯下如重甚加白柿桑白皮茅根蔗煎湯下神應回光散治障翳赤眼努肉攀睛木賊白芷甘草青箱子楮實子草決眀羌活石決眀川烏炮白蒺藜蟬蛻各等分右為末每服一錢食後茶湯調下酒調亦可兔絲子丸安神定魄眼目光眀虛眼可服青皮炒車前子巴戟去心杜仲蜜炒無絲為度威靈仙酒浸逺志去心牛膝酒浸蓯蓉酒浸熟地黃各一兩兔絲子三兩右為末酒煮麵糊為丸如梧桐子大每服三十丸空心鹽酒湯下洗眼藥銅青半兩白墡土一兩五倍子二錢半右為末用熱湯泡閉目熱洗不可使入眼內冷即住少頃再溫熱洗凡爛弦者皆可用洗諸證眼黃連當歸赤芍藥滑石各等分右為末湯泡澄清洗諸般翳障加石膏乳香秦皮洗爛弦風眼方蔓荆子五倍子湯泡去瓤右同煎澄清洗眼點赤眼熱眼桑葉二兩大黃半兩荆芥半兩朴硝二兩右為末用蜜水調貼兩太陽穴上退血熱法製玄眀粉用點熱眼赤眼良黃牯牛膽一箇淨朴硝二錢黃連一分右以二味實於膽中當風懸之每日以鴨翎毛於膽外掃下硝以盡為度用瓦罌收之臨用如常法點又點眼方黃連四兩銼右以水熬成膏再用大甜瓜一枚切開頂蓋刮去瓤子以生薄荷一層放馬牙硝一層重重填滿瓜中仍用瓜頂蓋蓋之弔於當風處三四日其硝自出瓜皮外以鵝毛逐日掃之與黃連膏子一處和勻白器中盛之點熱眼點貼諸般赤眼及頭風赤腫不開沖打兩太陽穴痛貼最良豬牙皂角黃檗薑黃南星草烏黃連右為末用生薑自然汁調貼太陽穴二三次痛止如有赤障起亦宜貼打傷眼赤腫不開加芙蓉豆粉調貼蔥椎貼亦妙逺年風赤眼亦能治貼眼藥赤芍蒲黃與鬱金芙蓉研末拌均勻珠缺土螺緊薑汁若還常痛止茶清痛甚加白芷南星無名異血見愁久不開者加生川烏治痘瘡入眼兼治斑疹患後睛上有物白蕪荑五十粒去皮蕤仁二十粒去皮蘆薈熊膽各三錢右同研細取麻油三兩調好攤在碗內再用碙砂乳香砒三味各如黃豆大研細又用熱艾一塊如雞子大裹之燒煙熏碗內藥以艾盡為度取出細研每用如粟米大點目中治婦人血風頭疼目痛草烏山梔右為末用蔥自然汁調搽太陽穴并眉上不可過眼搽後避風只看頭疼處塗之
