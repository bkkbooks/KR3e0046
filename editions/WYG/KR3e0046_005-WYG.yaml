body:
  text: 急救仙方卷五雜瘡頭上瘡治法煮熟雞子黄炒令油出右用油再入輕粉調和傅之方治蛇頭指痛不可忍臭不可聞者蜈蚣一條焙乾右為末用豬膽汁調塗即差又方生黒豆不拘多少右為末用黄梔子殻一箇納豆末於内籠縛在指頭即安治穿掌毒新桑葉一把右件研爛用絹包合上即愈治諸腫毒面東過梁地上擇陽日畫員圈隂日畫方圈一箇以生薑蘸好米醋於圈内磨取地上泥括在鉢内入大黄芒硝末同薑研爛敷於毒處留開瘡口毒自出矣治輕癬疥瘡亦可大風子黄連甘草油胡桃榆皮川椒輕粉白礬半生半熟蛇床子井泉石右各為末以油胡桃増減同杵為膏如彈子大用麄布包藥擦之痒處揩之痛處按之藥到即效矣治疰瘡疥瘡雄黄硫黄黄連蛇床子剪刀草焙乾右等分為細末用巴豆七粒以麻油煎至巴豆黒為度去巴豆候油冷入好輕粉和前藥末調塗之合掌散治諸般疥癩瘡馬兜鈴子一兩半生半炒為末白礬二錢半硫黄三錢二味别研右用清油調匀塗手上搓熱呵之以鼻嗅翕其氣其瘡自安治痤疿棗葉煎湯浴之治浸淫瘡玉英粉真蚌粉四兩滑石一兩菉豆粉二兩右為細末乾糝之治足跟寒天凍爛老薑葱白艾葉右各等分同研五月五日午時揩一時許更不再發矣諸瘡膏藥方清油一斤頭髪二兩併煎至鎔入甘草節當歸尾黄連巴豆萞麻子黄栝樓木鼈子各半兩煎二沸去滓再入水粉五兩又煎至沸入黄丹七兩又煎至沸入乳香末一兩用桃栁枝不住手攪挑入水中滴成珠不粘手則膏成矣又方麻油五兩巴豆二十八粒栁條二十八寸用火煎之候巴豆黒色濾去滓以黄丹二兩逐漸放入用柳枝不住手攪滴水中不散成膏不粘手住火再將乳香末一錢和匀瓦器盛之候冷攤用人面瘡此證當是寃結可作善事以解之必須真誠懴悔然後方可用藥宜服流氣飲久不可者服苦參丸以補腎水流氣飲見前苦參丸苦參四兩防風荆芥白芷川烏生去皮赤芍何首烏川芎獨活梔子牙皂蔓荆子茯苓山藥蒺䔧草烏少黄耆羌活白附子此四味名四生􅄆已上各一兩草烏止用三錢右為細末水煮麵糊為丸如梧桐子大每服三五十丸日進二三服空心用酒吞下如不飲酒者以好茶代之治赤眉瘡用豬腿筒骨五根或七根生打開取髓入銅銚鎔旋入白膠香末攪匀成膏為度取出於新磚上出炙毒一時研末再入輕粉不拘多少油調搽濕則乾糝治刀斧傷白芨石膏煅右同為細末糝瘡上亦可收口又用無名異末搽之又方鍋底墨煆研傅之湯火傷水磨炭末塗又方磨土硃塗又方用真桐油塗漆瘡用黄蜀葵花葉𢷬敷治蟾蛇丹方糯米粉和鹽同嚼唾患處又方鐡綉釘磨水搽又方馬藺丹草擂醋搽之即痊治黄蜂螫用熱酒洗之立效或用油搽治毒蛇傷方急飲好醋一二椀令毒不隨血走或飲清油一二盞亦可然後用藥或用頭繩紥定傷處兩頭又方白礬雄黄黄蠟右各等分為末成丸如指頭大每遇傷時即于香匙上鎔熱滴於瘡上或以竹管按上滴入則毒不散尤妙治曲蚓吹用老茶研末調塗之立瘥見夏子益衛生十全方治惡䖝叮咬大紙撚一箇麻油㸃燈照熏傷處其毒盡入油烟内矣治顛狗咬方用桃白皮煎服或灸傷處三五壮治虎傷方先喫清油一碗次用油洗瘡口又以乾葛煎水洗又用沙糖水調塗仍服沙糖水一兩碗解百毒及閩廣挑生金蠶蠱毒甘草長七寸四十九莖露厠坑中四十九日浄洗為末蜜丸瓶收遇中毒時口中嚼化即解
