  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0046_WYG_001-1a, image: WYG0744/WYG0744-0666c.png}
body:
  text: 急救仙方卷一背瘡治法發背廣一尺深一寸雖潰至骨不穿膜不死此證因飲食而感其毒發在胛肚之間急冝用藥治其胛肚中之毒内外夾攻之否則易腐作臭初發時用追疔奪命湯化毒消腫托裏散内托千金散可以内消中間敷觧毒生肌定痛藥四圍敷㧞毒散後用生肌膏藥必定見効蓮子發此證發於右胛中恐毒攻心急湏服藥散之又湏敷藥截住不令内攻如通背皆腫殆不可救小者可療諸瘡痛癢皆生於心心主血而行氣走痛諸瘡皆有主療敷貼之藥并可将火針三四針之為妙用化毒消腫托裏散加南星草烏木鼈子貝母大蒜生薑共為末米醋調敷留口二三日夜即消盡矣常湏以醋潤之蜂窠發此證頭發在上最不易治乃是反證却要仔細急湏服藥托裏生肌定痛散血恐毒氣攻心入膜必難治療因心火未散故也散走流注發此俗云鼈影之證醫方原無此説但取大小相連之象以狀其毒乗風熱而走也葢因風盛而生熱氣因熱極而四散走注急宜踈風散熱則熱氣自然而息若使流注於手足腰腿必死無疑矣腎俞發此證先因受濕繼乗怒氣飲熱酒而得之傷於内腎之間流毒在腎俞急冝服藥敷貼觧散内腎之毒更用生肌藥内外夾攻之若發傷腎膜者則有難治之患切戒怒氣行房稍或有犯决不可治慎之慎之腎俞雙發及胛癰此證腎俞雙發因飲熱酒行房事兼受濕氣怒氣而得也陽發於外可治隂發傷於腎膜膿稀者為虗難治必死胛癰發於左膊之間初發可用燈火㸃破追疔湯汗之即散右搭肩發此證發於右搭肩骨上生於動處雖難安猶可治串於左肩者必難治也用藥塗糁依後左搭肩方左搭肩發此證發於左搭肩骨上生於動處雖難安猶可治串於右肩者必難治也可用雞黄皮及絮焙乾為末濕則乾糁之乾則用清油調塗之對心發此證因心火盛而熱氣㑹生於此處其毒愈盛必走急用踈導心火之藥觧之然後用生肌藥可愈發背兩頭此證兩頭小四邉散是因飲食所致也氣食相合因虚而成氣虚而散所以開口而闊急服内消藥亦宜補陽也化毒消腫托裏散治癰疽發背乳骨癰疔瘡腫毒及一切惡瘡􅟻咽喉腫痛人参無亦可赤茯苓白术各六錢滑石桔梗金銀花各二兩山梔子五錢荆芥穂五錢當歸一兩川芎黄耆赤芍蒼术麻黄大黄黄芩防風甘草薄荷連翹石膏芒硝加􅒦砂不用此或加栝樓牡蠣貝母木香疔瘡加脚蓮河車􅗢疳加車前子木通竹葉疼痛加乳香没藥咽喉加大黄梔子竹葉燈草脚氣加宣木𤓰㯽榔𠻳加半夏薑汁製用生薑同煎右㕮咀每服五錢水一碗葱白一根煎熱服汗出為度服後若利三五行為妙大病不過三五服毒即内消盡矣解毒生肌定痛散治癰疽發背乳癰人面外膁金刀諸般惡瘡􅟻腫毒黄連一兩黄檗苦参各四两木賊防風各一两加羌活獨活右㕮咀大瓦瓶盛水入前藥煎湯以罏甘石十觔用炭火煆通紅鉗在藥湯内不問大小片皆令酥内青色方好如石不酥再将前藥滓煎湯以石淬酥方住却将瓦盆葢在地上一晝夜收去火毒候乾研極細末此石十觔用石膏二十觔别研極細拌勻和後藥用赤石脂煆谷丹炒此二味同前研和南木香血竭降真香乳香没藥白芷黄連黄檗白蘞各等分龍骨煆加硃砂何首烏有蟲加輕粉苦参百藥煎雄黄水不乾加螵蛸去皮右為細末與前藥拌和用之敷中間發背若黒不疼痛者即為隂艾葉一觔雄黄硫黄各半兩右二味同水煮艾半日候温敷之再煮别艾換之敷十餘遍若疼痛則可瘳不死如不疼痛出黒血者必死發背走開不住初發時即可用後藥篐之白鹽梅皂角右二味燒灰存性為末不發熱者米醋調四圍篐之連換即不走開若加薑汁同醋調尤妙如發熱者用茶清調塗立効海馬㧞毒散治發背諸惡瘡兼治疔瘡大効海馬一雙炙穿山甲黄土炒水銀硃砂各三錢雄黄三錢輕粉一錢腦子少許麝香少許右除水銀外各研為末和合入水銀再研至無星鍼破瘡口㸃藥入内一日一㸃神効竹筒吸毒方治諸般惡瘡用苦竹頭三寸刮去青皮似紙薄為佳其大小隨瘡斟酌當於毒瘡初發時用之白蒺藜蒼术烏桕皮厚朴各五錢右㕮咀用水同前竹筒煎以藥将乾為度乗竹筒熱以手按於瘡上頃之其筒自粘住不必手按也再用前藥分两另煮一筒候前竹筒冷換此熱者其膿自吸入筒中而瘡愈矣又竹筒吸毒方治發背癰疽疔瘡腫毒以㧞出膿血惡水蒼术白蘞烏桕皮厚朴艾葉好茶芽白芨白蒺藜各等分右用苦竹筒三五七箇長一寸一頭留節削去其青令如紙薄隨大小用之却用前藥煮竹筒十数沸待藥将乾為度乗竹筒熱以手𦂳按於瘡口上膿血水滿自然脫落否則用手㧞之更換别箇竹筒如是三五次毒可盡消即敷生肌藥肉滿後再用膏藥即愈秘𫝊十六味流氣飲亦名内補散治癰疽發背乳癰脚痛諸般惡瘡之毒未成速散已成即潰敗膿自出惡肉自去疼痛頓減非常有騐人参去蘆當歸酒洗官桂去皮川芎去土防風去蘆白芷桔梗去蘆嫩黄耆去蘆甘草炙厚朴去皮薑製各三錢加六味於後南木香白芍藥大腹子烏藥枳殻紫蘇葉炒令香透各三錢病不退加白茯苓白术煨熟地黄飲食不進加縮砂仁香附子疼痛加乳香没藥水不乾加貝母知母瘡不穿加皂角刺欬嗽加陳皮去白半夏湯洗七次杏仁用薑五片煎大便秘加大黄枳殻小便秘加麥門冬車前子木通燈草右為細末每服五六錢用酒調下不飲酒者木香湯代之米湯亦可按此方其所用皆發背風毒調理氣血排膿止痛生肌長肉等藥五毒不識而可坐收瘍醫者十全之功氣不和者多用氣藥為主血不和者多用血藥為主共㕮咀水一盞半葱白一根煎至七分加酒少許病在上食後服病在下空心服新添雲間喻嘉言所𫝊背瘡竒驗方血見愁一两酸漿草半两當歸二錢半乳香没藥各一錢二分半右焙乾為末每服七錢熱酒調服如用生藥酒水煎熱服留滓以敷瘡上鐡銅㧞毒膏初發諸般瘡癤㸃破便散好石灰燒皂角薫不過火糯米南星當歸赤芍藥同炒硇砂如去疔頭加此味餘不用砂牯牛斑猫右為細末用後灰煎水調用真炭灰桑柴灰脂麻灰皂角三四皮栁柴皮共煎濃湯再入鍋内慢火熬之待湯面上有白霜起方住火以噐貯之可調前藥小小㸃之三五次皮破毒出瘡便可散内塞散治諸惡瘡癤熱退膿血不止瘡内虚證疼痛可排膿定痛生肌内補托裏人参去蘆當歸去蘆酒浸黄耆鹽湯浸芎藭洗去土茯苓去皮防風去蘆桂心各二錢半桔梗逺志甘草白芷各一两􅒦砂香附子厚朴各二两赤小豆五合酒浸附子二枚去皮煨煩渴加五味子茯苓陳皮白芍藥熟地黄右㕮咀水一盞半生薑三片煎至七分入酒熱服洗藥方防風白芷赤芍藥苦参甘草節荆芥艾葉金銀花蒼耳𦍑活獨活荷葉蒂當歸尾牙皂栢子蜂房葱白茶脚右藥煎湯先薫待温洗浄以絹衣抹乾再用清油調生肌定痛散敷之如濕乾糁若無膿不要留口一日一換如有膿湏留口出毒去膿水敷後便用黒紙葢之以絹帯𦂳縳三五轉外膁三日一換不要打動立有功效桃花散治積年不効朽爛瘡口金瘡箭射打碎皮破血出不止石膏一觔黄泥封固煆過白礬二兩飛過血竭一兩别研黄丹細研火飛過水飛過松糖别研五倍子粉霜各三兩龍骨二兩别研右研細末磁罐收用可将此藥乾糁次日别用藥水洗浄再糁大能散血結口瘡愈後除痕方蔓菁子大風子續隨子蔓荆子右各等分為細末飯上蒸九遍童便浸一宿後炒乾為度以花葉紙包在絹内揩之可以除痕内固清心散治惡瘡熱盛焮痛作渴煩燥解毒極効辰砂茯苓人参白豆􅅳雄黄菉豆朴硝甘草腦子麝香皂角等分右為細末每服一錢蜜湯調下治惡瘡腫如梅李小豆者吳茱茰一兩小蒜二兩右研合傅之日三換以好為度治多年瘡口不乾冬􅆶葉焙右研細末貼之累效
